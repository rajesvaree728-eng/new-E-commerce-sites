<!DOCTYPE html>
<html>
<head>
  <title>Payment Details</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .form-box {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2 style="text-align:center;">Payment Details</h2>

  <div class="form-box">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="address" placeholder="Full Address" required>

    <select id="payment">
      <option value="cod">Cash on Delivery</option>
      <option value="upi">UPI</option>
      <option value="card">Credit/Debit Card</option>
    </select>

    <button id="pay-btn">Proceed to Pay</button>
  </div>

<script>
document.getElementById("pay-btn").addEventListener("click", () => {

    // You can validate fields here if needed

    window.location.href = "thankyou.html";
});
</script>

</body>
</html>
