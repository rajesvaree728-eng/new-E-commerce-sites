<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ethnic</title>
</head>
<body>
<header>
    <nav>
      <a href="e.html">Home</a>
      <a href="cat.html">Categories</a>
      <a href="help.html">Help</a>
      <a href="cart.html"> 🛒 </a>
    </nav>
  </header>
    <h2> Fashionable Ethnic Wear's </h2>
    <div id="products"></div>
    
</body>
</html>
<style>
header{
      background: rgb(240, 234, 234);
      color: #f5f5f5;
      padding: 24px;
      margin: 0;
      gap: 20px;

    }
    nav{
      gap: 20px;
      padding: 24px;
    }
    a{
      text-decoration: none;
    }
body{
    font-family: Arial, Helvetica, sans-serif;
    background: white;
    margin: 0;
    padding: 20px;
}
    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }

#products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 10px;
}
.card{
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0, 0, 0,0.1);
    text-align: center;
    transition: 0.3s;

}
.card:hover{
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0, 0, 0,0.2);
}
.card img{
    width: 100%;
    height: 250px;
    object-fit: contain;
    margin-bottom: 10px;
}
.price{
    font-size: 20px;
    font-weight: bold;
    color: red;
    margin: 10px 0;
}
button{
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover{
    background: gray;
}
</style>
<script>
    const productsDiv = document.getElementById("products");
    fetch("products.json")
    .then(res => res.json())
    .then(data => {
        const ethnics = data.filter(p => p.category === "ethnic");

        ethnics.forEach(product => {
            const card = document.createElement("div");
            card.className ="card";

            card.innerHTML =`
            <img src="${product.image}">
            <h3>${product.title}</h3>
            <p class="price">₹${product.price}</p>
            <button class="add-to-cart-btn"
  data-id="${product.id}"
  data-name="${product.title}"
  data-price="${product.price}"
  data-img="${product.image}">
  🛒 Add to Cart
</button>        `;
        productsDiv.appendChild(card);
        });
    })
    .catch(error => {
        console.log("Error:",error);
    
    });
let cart = JSON.parse(localStorage.getItem("live_cart_with_img")) || [];

document.addEventListener("click", (event) => {
  if (event.target.classList.contains("add-to-cart-btn")) {

    const btn = event.target;

    const product = {
      id: btn.dataset.id,
      name: btn.dataset.name,
      price: Number(btn.dataset.price),
      img: btn.dataset.img,
      quantity: 1
    };

    addToCart(product);
  }
});

function addToCart(product) {
  let existing = cart.find(item => item.id === product.id);

  if (existing) {
    existing.quantity++;
  } else {
    cart.push(product);
  }

  localStorage.setItem("live_cart_with_img", JSON.stringify(cart));

  alert("Added to cart!");
}

    
</script>
